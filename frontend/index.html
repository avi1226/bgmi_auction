<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BGMI Auction</title>
    <!-- Add error listener immediately -->
    <script>
        window.addEventListener('error', function(event) {
            console.error(event.error);
            document.body.innerHTML += '<div style="background:red;color:white;padding:20px;position:fixed;top:0;left:0;width:100%;z-index:9999">ERROR: ' + event.message + '</div>';
        });
        window.addEventListener('unhandledrejection', function(event) {
            console.error(event.reason);
            document.body.innerHTML += '<div style="background:orange;color:white;padding:20px;position:fixed;top:0;left:0;width:100%;z-index:9999">PROMISE ERROR: ' + event.reason + '</div>';
        });
    </script>
  </head>
  <body>
    <div id="root">
        <div style="color: white; padding: 50px; text-align: center;">
            <h1>Starting Application...</h1>
            <p>If this message stays, check the console (F12).</p>
        </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
